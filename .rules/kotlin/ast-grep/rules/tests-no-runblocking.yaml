# TENET: Use runTest, not runBlocking in tests.
# Rationale: runBlocking pins the thread, runs delays in real time, and lets leaked coroutines pass silently.
# runTest gives virtual time + leak detection. Live-IO tests are exempt.
id: tests-no-runblocking
language: kotlin
severity: error
message: "Use runTest (kotlinx.coroutines.test), not runBlocking. runBlocking uses real time and hides leaks."
files:
  - "**/test/**/*.kt"
  - "**/*Test.kt"
ignores:
  - "**/*Live*Test.kt"
  - "**/*Integration*Test.kt"
rule:
  any:
    - pattern: runBlocking { $$$BODY }
    - pattern: runBlocking($$$ARGS) { $$$BODY }
    - pattern: import kotlinx.coroutines.runBlocking
