name: release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: checkout without persisted credentials
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: setup java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: install workspaces
        run: npm ci

      - name: repository gates
        run: npm run gate

      - name: build exact release jar and compliance reports
        working-directory: gateway
        run: ./gradlew :app:shadowJar --no-daemon --no-parallel --stacktrace

      - name: stage exact release bundle
        run: bash checks/release/stage.sh

      - name: accept exact release bundle
        run: SPLICE_EXPECTED_VERSION="${GITHUB_REF_NAME#v}" bash checks/release/accept.sh

      - name: transfer accepted bundle to publisher
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: accepted-release
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: download the accepted bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: accepted-release
          path: dist

      - name: verify transferred checksums
        working-directory: dist
        run: sha256sum -c sha256sums.txt

      - name: attest build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: dist/sha256sums.txt

      - name: attest CycloneDX SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/splice.jar
          sbom-path: dist/bom.cdx.json

      - name: upload every asset to an unpublished draft
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: true
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/splice.jar
            dist/splice-launch
            dist/install.sh
            dist/LICENSE
            dist/THIRD_PARTY_NOTICES.md
            dist/THIRD_PARTY_LICENSES.txt
            dist/PROVENANCE.md
            dist/bom.cdx.json
            dist/dependency-licenses.json
            dist/sha256sums.txt

      - name: publish only after every upload and attestation succeeded
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false
