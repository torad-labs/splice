# runBlocking inside daemon code wedges an event-loop thread; it is legal only at
# process entry (Main.kt) and in CLI one-shots.
id: kt-no-runblocking-in-daemon
language: kotlin
severity: error
message: "runBlocking only at process entry (app Main.kt / cli): daemon code stays suspend all the way."
files:
  - gateway/*/src/main/**/*.kt
ignores:
  - gateway/app/src/main/kotlin/Main.kt
  - gateway/app/src/main/kotlin/cli/**
rule:
  pattern: runBlocking
