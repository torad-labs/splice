# reasoning-cache.toml — server-side reasoning continuity for the responses dialect (2026-07-24).
# LAW: concept #945 — this manifest IS the memory; access ONLY via dev/campaigns/manifest.py
# (`python3 dev/campaigns/manifest.py dev/campaigns/reasoning-cache.toml <verb>`).
# Statuses: todo|in_flight|done|verified. Wrong claims get honesty-reconcile notes, never edits.
#
# EVIDENCE BASE (eli source verification 2026-07-24, openai/codex fetched copies in the session
# scratchpad; receipts inline in items): codex-rs replays encrypted reasoning items on EVERY tool
# round-trip — store:false stateless FULL replay on HTTP (client.rs:915, :888 include
# reasoning.encrypted_content unconditional; client_common.rs:52-61 input=history clone), display
# of summaries is an INDEPENDENT channel (event_mapping.rs:194-220 reads summary, never
# encrypted_content). splice with replay_reasoning=false drops all reasoning between requests →
# gpt-5.6 amnesia every tool result: repeated tool calls, duplicated reasoning, wrong-tool grabs
# (operator report 2026-07-24). The client-round-trip replay mode (redacted_thinking) costs empty
# spinner walls; codex pays nothing because state is held process-internal. This campaign holds it
# GATEWAY-internal instead. OpenAI contract: reasoning must immediately precede its function_call
# (400 otherwise, both directions); rs_ ids preserved verbatim, at most once (upgrading-gpt56.md:204);
# encrypted_content can go stale (invalid_encrypted_content). codex forces parallel_tool_calls=false
# on the 5.6 lite path (client.rs:913) — splice already mirrors this (ResponsesQuirks lite doc).

# LAW [2026-07-24]: PRECONDITION [2026-07-24]: stacked on feat/stream-reanchor — starts after PR #42 merges; same translator seams
# LAW [2026-07-24]: INJECT-ONCE-PER-TURN [2026-07-24, eli risk 1+2]: injection is driven by the ASSISTANT message's tool_use blocks (immutable), never by which tool_results arrived (partial batches lie); ONE reasoning injection immediately before the FIRST function_call of its turn; rs_ ids verbatim, each at most once — duplication or misplacement is a hard upstream 400
# LAW [2026-07-24]: NEVER-BELOW-STATUS-QUO [2026-07-24]: cache miss, eviction, or staleness degrades to exactly today's behavior (no injection), never to a failed turn; on invalid_encrypted_content the request retries ONCE with the reasoning items stripped
# LAW [2026-07-24]: RETENTION [2026-07-24]: the gateway now holds conversation-derived OPAQUE material (encrypted envelopes only, never plaintext thinking) bounded + TTL'd — documented in PRODUCT/security notes as part of RC-5, never silently
# LAW [2026-07-24]: NO PUSH, CLI-ONLY [2026-07-24]: agents never push or rewrite history; ledger updates only via manifest.py
