name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: install ast-grep
        run: npm install -g @ast-grep/cli
      - name: install workspaces
        run: npm ci
      - name: walls (same rules the write-time hook runs)
        run: npm run gate:rules
      - name: hook orchestrator tests
        run: npm run test:hooks
      - name: config surface guard (rules that guard the rules)
        run: bash checks/config-guard.sh
      - name: server tests
        run: npm test -w server
      - name: webui lint (FSD boundaries are a hard gate)
        run: npm run lint -w webui
      - name: webui tests
        run: npm test -w webui
      - name: webui build (single-file artifact must build clean)
        run: npm run build -w webui
      - name: committed dist is current
        run: git diff --exit-code -- webui/dist/index.html || (echo 'webui/dist/index.html is stale: rebuild and commit it' && exit 1)

  # The Kotlin gateway tier. Until this job existed, module-law (config-time check), detekt
  # (maxIssues:0), the Konsist arch-tests, and ~60 unit tests were authored + wired into Gradle but
  # NEVER RUN by any automation — only the ast-grep walls executed. Strengthening a tier nothing
  # runs is theatre (#924); this makes `./gradlew check` block a red PR. Make it a REQUIRED status
  # check in branch protection so "merge red" becomes inexpressible, not merely discouraged.
  gateway-gradle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: gradle check (module-law + detekt + konsist + unit + load tests)
        working-directory: gateway
        # check runs everything but the shadow/dist tasks (those are Gradle-9-incompatible; the jar
        # is built separately). --no-daemon: ephemeral runner, no daemon to reuse.
        run: ./gradlew check --no-daemon --stacktrace
