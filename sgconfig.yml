# splice ast-grep config — the single source of truth for the architecture walls.
# The SAME rule files run two ways (same-checker-twice):
#   - agent hook: .claude/hooks/orchestrator.py (PreToolUse) scans PROPOSED write
#     content mirrored to a temp tree, so files:/ignores: globs bind identically
#   - gate:       `npm run gate:rules` (ast-grep scan + ast-grep test) on the tree / in CI
# Policy lives ONLY in .rules/rules/*.yml — never in per-rule Python.
ruleDirs:
  - .rules/rules
  - .rules/kotlin-splice
testConfigs:
  - testDir: .rules/rule-tests
