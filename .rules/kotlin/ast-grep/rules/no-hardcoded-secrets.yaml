# TENET: No hardcoded secrets in code.
# Rationale: Secrets belong in environment variables or secure vaults.
# Never commit API keys, passwords, or tokens to source control.
id: no-hardcoded-secrets
language: kotlin
severity: error
message: "Don't hardcode secrets. Use environment variables or secure vaults."
files:
  - "**/*.kt"
ignores:
  - "**/test/**"
rule:
  kind: string_content
  regex: "(sk-[a-zA-Z0-9]{20,}|api[_-]?key\\s*=\\s*['\"][^'\"]{10,}|password\\s*=\\s*['\"][^'\"]+['\"]|Bearer\\s+[a-zA-Z0-9._-]{20,})"
