name: release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: checkout without persisted credentials
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: setup java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: setup node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: install workspaces
        run: npm ci

      - name: repository gates
        run: npm run gate

      - name: build exact release jar and compliance reports
        working-directory: gateway
        run: ./gradlew :app:shadowJar --no-daemon --no-parallel --stacktrace

      - name: stage exact release bundle
        run: bash checks/release/stage.sh

      - name: accept exact release bundle
        run: SPLICE_EXPECTED_VERSION="${GITHUB_REF_NAME#v}" bash checks/release/accept.sh

      - name: transfer accepted bundle to publisher
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: accepted-release
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: download the accepted bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: accepted-release
          path: dist

      - name: verify transferred checksums
        working-directory: dist
        run: sha256sum -c sha256sums.txt

      - name: attest build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: dist/sha256sums.txt

      - name: attest CycloneDX SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/splice.jar
          sbom-path: dist/bom.cdx.json

      - name: upload every asset to an unpublished draft
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          draft: true
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/splice.jar
            dist/splice-launch
            dist/install.sh
            dist/LICENSE
            dist/THIRD_PARTY_NOTICES.md
            dist/THIRD_PARTY_LICENSES.txt
            dist/PROVENANCE.md
            dist/bom.cdx.json
            dist/dependency-licenses.json
            dist/sha256sums.txt

      - name: publish only after every upload and attestation succeeded
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false
