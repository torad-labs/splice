# splice — example multi-provider topology.
#
# Copy to ~/.config/splice/splice.toml (or run `splice init` for the codex-only starter).
# Loaded once at daemon start; adding a provider/head is an operator action → restart the daemon.
#
# THE POINT: a new vendor is added HERE, in TOML — no Kotlin. The daemon dispatches on
# (dialect, auth.kind) to the right built-in provider:
#   openai-responses + chatgpt-oauth        → codex (ChatGPT backend)
#   openai-responses + grok-oauth           → grok / xAI (SuperGrok / X Premium+)
#   openai-responses + api-key (hash key)   → OpenAI platform
#   openai-chat      + api-key              → ANY OpenAI-compatible vendor (Ollama/OpenRouter/…)

[daemon]
control_port = 3096          # loopback-only control plane + dashboard

# Reasoning display — edit here, restart daemon. No code change.
# Env aliases (CLAUDEX_SHOW_REASONING etc.) and runtime PATCH still override these.
show_reasoning = "text"      # "text" | "thinking" | "off"  — stream thinking into Claude Code
summary        = "detailed"  # "detailed" | "concise" | "auto" | "none"
# effort       = "high"      # optional; omit → high (Grok floors invalid values to low)
replay_reasoning = false     # NEVER turn on lightly: replaying prior opaque encrypted reasoning items thins fresh reasoning

# ── codex: ChatGPT Codex subscription via OAuth ────────────────────────────────
[providers.codex]
dialect = "openai-responses"
base_url = "https://chatgpt.com/backend-api/codex"
# EXPERIMENTAL: reuses the Codex CLI's public OAuth client identity — NOT a vendor-documented
# third-party integration. auth.json is password-equivalent; splice reads AND refreshes it in place.
# Documented alternative: OpenAI Platform API keys (kind = "api-key", env = "OPENAI_API_KEY").
auth = { kind = "chatgpt-oauth", file = "~/.codex/auth.json" }
quirks = { store = false, account_id_header = true, cache_key = "first-message-hash", effort_ceiling = "max", summary_field = true }
[[providers.codex.models]]
id = "gpt-5.6-sol"
label = "Codex 5.6 Sol"
context_window = 400000
[[providers.codex.models]]
id = "gpt-5.6-terra"
label = "Codex 5.6 Terra"
context_window = 400000
[[providers.codex.models]]
id = "gpt-5.6-luna"
label = "Codex 5.6 Luna"
context_window = 400000
[[providers.codex.models]]
id = "gpt-5.5"
label = "Codex 5.5"
context_window = 272000
[[providers.codex.models]]
id = "gpt-5.4"
label = "Codex 5.4"
context_window = 272000
[[providers.codex.models]]
id = "gpt-5.4-mini"
label = "Codex 5.4 Mini"
context_window = 272000
[[providers.codex.models]]
id = "gpt-5.3-codex-spark"
label = "Codex Spark"
context_window = 128000

# ── xAI / grok: same Responses dialect, OAuth (SuperGrok/X Premium+), session cache key ──
[providers.xai]
dialect = "openai-responses"
base_url = "https://api.x.ai/v1"
# EXPERIMENTAL: reuses the Grok CLI's public OAuth client identity — NOT a vendor-documented
# third-party integration. auth.json is password-equivalent; splice reads AND refreshes it in place.
# Documented alternative: an OpenRouter API key (kind = "api-key", env = "OPENROUTER_API_KEY").
auth = { kind = "grok-oauth", file = "~/.grok/auth.json" }  # browser login: `claude-grok login`
# summary_field=true enables the reasoning.summary field (value comes from [daemon].summary).
# Raw reasoning items stay encrypted by xAI; public form is summary/reasoning_text only.
quirks = { cache_key = "session-id", effort_ceiling = "high", summary_field = true, tool_choice = true }
[[providers.xai.models]]
id = "grok-4.5"
label = "Grok 4.5"
context_window = 500000       # grok-4.5 is 500k; grok-4.3 is 1M; grok-build is 256k
[[providers.xai.models]]
id = "grok-4.3"
label = "Grok 4.3"
context_window = 1000000
[[providers.xai.models]]
id = "grok-build-latest"
label = "Grok Build"
context_window = 256000

# ── openrouter: the "new vendor = pure TOML, zero code" proof (Chat Completions) ─
# Swap base_url + env for Ollama (http://localhost:11434/v1), LM Studio, DeepSeek, etc.
[providers.openrouter]
dialect = "openai-chat"
base_url = "https://openrouter.ai/api/v1"
auth = { kind = "api-key", env = "OPENROUTER_API_KEY" }
[[providers.openrouter.models]]
id = "meta/llama-4"
label = "Llama 4"
context_window = 128000

# ── kimi / Moonshot: anthropic-passthrough dialect, device-flow OAuth (x-api-key) ─
# api.kimi.com/coding speaks the Anthropic Messages wire natively. Browser device login:
# `claude-kimi login` (RFC 8628 — enter a code, no loopback redirect). The wire id sent upstream
# is the BARE model (the `[1m]` suffix is stripped); the 1M context tier is a plan entitlement,
# not a distinct model. Moonshot's pay-per-token anthropic base (api.moonshot.ai/anthropic) works
# too — set auth = { kind = "api-key", env = "MOONSHOT_API_KEY" } and it authenticates via Bearer.
[providers.kimi]
dialect = "anthropic-passthrough"
base_url = "https://api.kimi.com/coding"
# EXPERIMENTAL: reuses the Kimi CLI's public OAuth client identity — NOT a vendor-documented
# third-party integration. kimi-code.json is password-equivalent; splice reads AND refreshes it in place.
# Documented alternative: a Moonshot API key (kind = "api-key", env = "MOONSHOT_API_KEY").
auth = { kind = "kimi-oauth", file = "~/.kimi/credentials/kimi-code.json" }
# Window lookups happen on the STRIPPED id ("k3"), while the picker entry below keeps the "[1m]"
# hint — this exact-match row keeps K3's 1M window independent of model-list order.
[[providers.kimi.extra_windows]]
id = "k3"
context_window = 1048576
[[providers.kimi.models]]
id = "k3[1m]"                  # sent upstream as bare `k3`; [1m] is a display/context-tier hint
label = "Kimi K3 (1M)"
description = "1M context needs the Allegretto plan or higher — Moderato serves 256K."
context_window = 1048576
[[providers.kimi.models]]
id = "kimi-for-coding"
label = "Kimi K2.7 Code"
context_window = 262144
[[providers.kimi.models]]
id = "kimi-for-coding-highspeed"
label = "Kimi K2.7 Code (highspeed)"
context_window = 262144

# ── heads: each is a Claude Code wrapper on its own loopback port ───────────────
# `command` names the installed wrapper (`splice install` links ~/.local/bin/<command>).
[claude]                       # global config-sharing policy for every wrapper
share = ["settings", "agents", "commands", "skills", "hooks", "plugins", "CLAUDE.md", "mcps"]

[heads.claudex]
provider = "codex"
port = 3099
discovery_prefix = "claude-codex--"
pinned_model = "gpt-5.6-sol"
[heads.claudex.claude]
command = "claudex"

[heads.claude-grok]
provider = "xai"
port = 3100
discovery_prefix = "claude-grok--"
pinned_model = "grok-4.5"
[heads.claude-grok.claude]
command = "claude-grok"
isolate = ["commands"]         # this head gets its own commands/, everything else shared

[heads.openrouter]
provider = "openrouter"
port = 3101
discovery_prefix = "claude-openrouter--"
pinned_model = "meta/llama-4"
[heads.openrouter.claude]
command = "claudeor"

[heads.claude-kimi]
provider = "kimi"
port = 3102
discovery_prefix = "claude-kimi--"
pinned_model = "k3[1m]"
[heads.claude-kimi.claude]
command = "claude-kimi"
