version: 2
# Patch+minor updates arrive as ONE grouped PR per ecosystem per week (majors stay
# individual PRs and are excluded from auto-merge by dependabot-automerge.yml).
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "gradle"
    directory: "/gateway"
    schedule:
      interval: "weekly"
    ignore:
      # kotlin 2.4.x is blocked by CodeQL's Kotlin extractor (KotlinVersionTooRecentError,
      # see #18/#37) — a required check. Unignore when CodeQL supports 2.4.x.
      - dependency-name: "org.jetbrains.kotlin*"
    groups:
      gradle-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
